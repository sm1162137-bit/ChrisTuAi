<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安子</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            background: #1a1a2e;
            overflow: hidden;
        }

        #app {
            width: 390px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            justify-content: flex-end;
            /* 改這裡 */
            overflow: hidden;
        }

        #bottom-area {
            margin-top: auto;
            position: relative;
            z-index: 10;
        }

        #topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(26, 26, 46, 0.7);
            backdrop-filter: blur(10px);
        }

        #topbar img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #ff6b9d;
            object-fit: cover;
        }

        #topbar-info {
            flex: 1;
        }

        #topbar-info h1 {
            color: white;
            font-size: 16px;
        }

        #topbar-info p {
            color: #4CAF50;
            font-size: 12px;
        }

        #back-btn,
        #menu-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            width: 40px;
            height: 40px;
        }

        #back-btn:active,
        #menu-btn:active {
            background: #333;
        }

        #chatbox {
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 34vh;
            position: relative;
            z-index: 10;
        }


        .message-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .message-row.user {
            justify-content: flex-end;
            align-items: flex-end;
        }

        .message-row.anko {
            justify-content: flex-start;
        }

        .row-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
            position: relative;
            z-index: 10;
        }

        .message-row.user .bubble {
            background: rgba(69, 69, 71, 0.35);
            color: #eee;
            border-bottom-right-radius: 4px;
            backdrop-filter: blur(5px);
        }

        .message-row.anko .bubble {
            background: rgba(69, 69, 71, 0.35);
            color: #eee;
            border-bottom-left-radius: 4px;
            backdrop-filter: blur(5px);
        }

        #inputarea {
            display: flex;
            padding: 12px 16px;
            gap: 8px;
            background: rgba(26, 26, 46, 0.7);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        #userinput {
            flex: 1;
            padding: 10px 16px;
            border-radius: 24px;
            border: 1px solid #444;
            background: #2a2a3e;
            color: white;
            font-size: 15px;
            outline: none;
        }

        #userinput::placeholder {
            color: #888;
        }

        #send-btn {
            padding: 10px 20px;
            background: #ff6b9d;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.1s;
        }

        #send-btn:active {
            transform: scale(0.92);
            opacity: 0.8;
        }

        #send-btn:disabled {
            background: #888;
            cursor: not-allowed;
            transform: none;
            opacity: 0.6;
        }

        .action {
            color: #270f0f;
            font-style: italic;
            font-size: 13px;
            transition: transform 0.1s, opacity 0.1s;
        }

        .typing span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #aaa;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.2s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-8px);
            }
        }

        .timestamp {
            font-size: 11px;
            color: #666;
            align-self: flex-end;
            margin-bottom: 4px;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>

<body>
    <!-- 聊天介面 -->
    <div id="app">
        <div id="bg-layer"
            style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:-1; background:url('/static/anko.png') center top / cover no-repeat;">
        </div>
        <div id="model-container"
            style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:auto; overflow:hidden;">
        </div>

        <div id="topbar">
            <button id="back-btn">&#8592;</button>
            <img src="/static/anko1.png" id="topbar-avatar">
            <div id="topbar-info">
                <h1>杉菜安子</h1>
                <p>● 在線</p>
            </div>
            <button id="menu-btn">&#9776;</button>
        </div>

        <div id="bottom-area">
            <div id="chatbox"></div>
            <div id="inputarea">
                <input id="userinput" type="text" placeholder="對安子說些什麼...">
                <button id="send-btn" onclick="sendMessage()">傳送</button>
            </div>
        </div>

        <script>
            // ===== Three.js 場景 =====
            const container = document.getElementById('model-container');
            const appEl = document.getElementById('app');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, appEl.clientWidth / appEl.clientHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true });
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.8;
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.setSize(appEl.clientWidth, appEl.clientHeight);
            container.appendChild(renderer.domElement);
            renderer.domElement.style.filter = 'saturate(1.8) brightness(0.8) contrast(1.05) sepia(0.15) hue-rotate(5deg)';
            // 燈光
            const ambientLight = new THREE.AmbientLight(0xffffff, 1);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(0, 5, 5);
            scene.add(dirLight);
            // 載入模型
            let mixer;
            let currentAction = null;
            let gltfAnimations = null;
            let model = null;
            const clock = new THREE.Clock();

            function playAnimation(name) {
                if (!mixer || !gltfAnimations) return;
                const clip = THREE.AnimationClip.findByName(gltfAnimations, name);
                if (!clip) return;
                const newAction = mixer.clipAction(clip);
                if (currentAction) {
                    currentAction.fadeOut(0.3);
                    newAction.reset().fadeIn(0.3).play();
                } else {
                    newAction.play(); // 第一次直接播，不 fadeIn
                }
                currentAction = newAction;
            }
            // 修改 loader.load 裡面，把 const model 改成直接賦值

            const loader = new THREE.GLTFLoader();
            loader.load('/static/anko_all.glb', function (gltf) {
                model = gltf.scene;
                scene.add(model);
                model.rotation.x = -0.16;
                model.position.y = -1.1;

                let firstMesh = true;
                model.traverse(function (child) {
                    if (child.isMesh) {
                        if (firstMesh) firstMesh = false;
                        else child.visible = false;
                    }
                });

                camera.position.set(-0.3, 1.2, 2.85);
                camera.lookAt(0, 0.3, 0);

                gltfAnimations = gltf.animations;
                mixer = new THREE.AnimationMixer(model);
                playAnimation('Breathing Idle');

            }, undefined, function (error) {
                console.error('載入失敗:', error);
            });

            let isAnimating = false;

            document.getElementById('model-container').addEventListener('click', function () {
                if (isAnimating) return;
                isAnimating = true;

                mixer.stopAllAction();
                const clip = THREE.AnimationClip.findByName(gltfAnimations, 'Surprised');
                if (clip) {
                    const action = mixer.clipAction(clip);
                    action.reset();
                    action.time = 0.6;
                    action.play();
                    currentAction = action;
                }

                setTimeout(() => {
                    playAnimation('Waving');
                    setTimeout(() => {
                        playAnimation('Breathing Idle');
                    }, 2000);
                }, 3000); // 從1000改成3000，等模型載入
            })
                function animate() {
                    requestAnimationFrame(animate);
                    if (mixer) mixer.update(clock.getDelta());
                    renderer.render(scene, camera);
                }
                animate();
                // ===== 聊天功能 =====
                function formatMessage(text) {
                    return text.replace(/\*([^*]+)\*/g, '<span class="action">$1</span>');
                }

                async function sendMessage() {
                    const input = document.getElementById("userinput");
                    const chatbox = document.getElementById("chatbox");
                    const btn = document.getElementById("send-btn");
                    const message = input.value.trim();
                    if (!message) return;

                    btn.disabled = true;
                    btn.textContent = "...";

                    const now = new Date();
                    const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

                    chatbox.innerHTML += `
                <div class="message-row user">
                    <div class="timestamp">${time}</div>
                    <div class="bubble">${message}</div>
                </div>`;
                    input.value = "";
                    chatbox.scrollTop = chatbox.scrollHeight;

                    const typingId = "typing-" + Date.now();
                    chatbox.innerHTML += `
                <div class="message-row anko" id="${typingId}">
                    <img src="/static/anko1.png" class="row-avatar">
                    <div class="bubble typing">
                        <span></span><span></span><span></span>
                    </div>
                </div>`;
                    chatbox.scrollTop = chatbox.scrollHeight;

                    const response = await fetch("/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ message: message })
                    });

                    const data = await response.json();
                    console.log('data:', data);
                    // 根據動作切換動畫
                    // 從 reply 提取動作描述
                    const actionText = data.action || '';
                    console.log('動作:', actionText);

                    if (actionText.includes('開心') || actionText.includes('笑') || actionText.includes('高興')) {
                        playAnimation('Happy Idle');
                    } else if (actionText.includes('難過') || actionText.includes('哭') || actionText.includes('傷心') || actionText.includes('嘆')) {
                        playAnimation('Sad Idle');
                    } else if (actionText.includes('害羞') || actionText.includes('臉紅')) {
                        playAnimation('Bashful');
                    } else if (actionText.includes('思考') || actionText.includes('想')) {
                        playAnimation('Thinking');
                    } else if (actionText.includes('揮手') || actionText.includes('打招呼')) {
                        playAnimation('Waving');
                    } else if (actionText.includes('點頭') || actionText.includes('說話')) {
                        playAnimation('Head Nod Yes');
                    } else {
                        playAnimation('Breathing Idle');
                    }

                    const typingEl = document.getElementById(typingId);
                    if (typingEl) typingEl.remove();

                    chatbox.innerHTML += `
                <div class="message-row anko">
                    <img src="/static/anko1.png" class="row-avatar">
                    <div class="bubble">${formatMessage(data.reply)}</div>
                    <div class="timestamp">${time}</div>
                </div>`;
                    chatbox.scrollTop = chatbox.scrollHeight;

                    btn.disabled = false;
                    btn.textContent = "傳送";
                }

                window.onload = function () {
                    const chatbox = document.getElementById("chatbox");
                    const now = new Date();
                    const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

                    const randomGreeting = "*揮手微笑* 你來啦～ 有什麼想跟我說的嗎？❤️";

                    chatbox.innerHTML += `
                <div class="message-row anko">
                    <img src="/static/anko1.png" class="row-avatar">
                    <div class="bubble">${formatMessage(randomGreeting)}</div>
                    <div class="timestamp">${time}</div>
                </div>`;

                    setTimeout(() => {
                        playAnimation('Waving');
                        setTimeout(() => {
                            playAnimation('Breathing Idle');
                        }, 2000);
                    }, 1000); // 等模型載入後再播
                }


                document.getElementById("userinput").addEventListener("keypress", function (e) {
                    if (e.key === "Enter") sendMessage();
                });
        </script>
</body>

</html>
